<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Capstone</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="dark">

  <!-- ===================== -->
  <!-- TITLE BAR -->
  <!-- ===================== -->
  <div class="titlebar">
    <div class="logo-wrapper">
      <img src="../assets/logo.png" class="logo-img" />
      <span class="logo-text">Loom</span>
    </div>

    <div class="nav">
      <span class="nav-tab active" data-page="dashboard-page">Dashboard</span>
      <span class="nav-tab" data-page="projects-page">Projects</span>
      <span class="nav-tab">Analysis</span>
      <span class="nav-tab">Settings</span>
    </div>

    <div class="right-controls">
      <input type="text" placeholder="Search..." />
      <div class="theme-toggle"></div>
      <div class="profile"></div>
    </div>

    <div class="window-controls">
      <div class="dot yellow" id="minimize"></div>
      <div class="dot green" id="maximize"></div>
      <div class="dot red" id="close"></div>
    </div>
  </div>

  <!-- ===================== -->
  <!-- MAIN CONTAINER (CRITICAL FIX) -->
  <!-- ===================== -->
  <div class="main-container">
    <div id="page-container">

      <!-- ===================== -->
      <!-- DASHBOARD PAGE -->
      <!-- ===================== -->
      <div id="dashboard-page" class="page active">
        <div class="dashboard">

          <div id="most-used-skills" class="card">Most Used Skills</div>

          <div class="card error-analysis-card">
            <h2 class="card-title">Error Analysis</h2>
            <div id="error-analysis-container" class="error-analysis-container"></div>
          </div>

          <div class="card">
            <h3>Project Health</h3>
            <div id="project-health-container" class="health-grid"></div>
          </div>

          <div class="card recent-projects-card">
            <h2 class="card-title">Recent Projects</h2>
            <div id="recent-projects-container" class="recent-projects-container"></div>
          </div>

          <div id="system-health-card" class="card">
            <h3>System Health</h3>

            <div class="status-row">
              <span id="status-dot" class="status-dot"></span>
              <span id="system-status">Checking...</span>
            </div>

            <div class="gauges">

              <!-- CPU -->
              <div class="gauge">
                <svg viewBox="0 0 100 60">
                  <path class="bg-arc" d="M10 50 A40 40 0 0 1 90 50" />
                  <path id="cpu-arc" class="progress-arc" d="M10 50 A40 40 0 0 1 90 50" />
                </svg>
                <div class="gauge-info">
                  <span id="cpu-value">0%</span>
                  <span id="cpu-temp">--°C</span>
                </div>
                <p>CPU</p>
                <canvas id="cpu-chart" class="mini-chart"></canvas>
              </div>

              <!-- Memory -->
              <div class="gauge">
                <svg viewBox="0 0 100 60">
                  <path class="bg-arc" d="M10 50 A40 40 0 0 1 90 50" />
                  <path id="memory-arc" class="progress-arc" d="M10 50 A40 40 0 0 1 90 50" />
                </svg>
                <div class="gauge-info">
                  <span id="memory-value">0%</span>
                  <span>RAM</span>
                </div>
                <p>Memory</p>
                <canvas id="memory-chart" class="mini-chart"></canvas>
              </div>

              <!-- GPU -->
              <div class="gauge">
                <svg viewBox="0 0 100 60">
                  <path class="bg-arc" d="M10 50 A40 40 0 0 1 90 50" />
                  <path id="gpu-arc" class="progress-arc" d="M10 50 A40 40 0 0 1 90 50" />
                </svg>
                <div class="gauge-info">
                  <span id="gpu-value">0%</span>
                  <span id="gpu-temp">--°C</span>
                </div>
                <p id="gpu-label">GPU</p>
                <canvas id="gpu-chart" class="mini-chart"></canvas>
              </div>

            </div>
          </div>

          <div class="card">
            <h3 class="card-title">Activity Log</h3>
            <div id="recent-activity" class="activity-container"></div>
          </div>

        </div>
      </div>

      <!-- ===================== -->
      <!-- PROJECTS PAGE -->
      <!-- ===================== -->
      <div id="projects-page" class="page">
        <div class="projects-page-wrapper">

          <div class="projects-header">
            <h1>Projects</h1>
            <button id="upload-project-btn" class="primary-btn">
              Upload Project
            </button>
          </div>

          <div id="projects-list" class="projects-list">
            <div class="empty-state">
              No projects uploaded yet.
            </div>
          </div>

        </div>
      </div>

    </div>
  </div>

  <script src="github.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
